recipe: default.v1

language: ru

pipeline:
  - name: WhitespaceTokenizer
  - name: CountVectorsFeaturizer
    analyzer: char_wb
    min_ngram: 2
    max_ngram: 4
  - name: CountVectorsFeaturizer
    analyzer: word
  - name: RegexFeaturizer
  - name: DIETClassifier
    epochs: 100
    constrain_similarities: true
  - name: EntitySynonymMapper
  - name: FallbackClassifier
    threshold: 0.7
    ambiguity_threshold: 0.1

policies:
  # Диалог только из RulePolicy + формы (без TED и без MemoizationPolicy):
  # MemoizationPolicy по минимальной story мог «ломать» active_loop и приводить
  # к utter_default / action_default_fallback вместо продолжения формы.
  - name: RulePolicy
    # action_default_fallback один раз подсказывает и переводит диалог в listen;
    # utter_out_of_scope как core_fallback даёт зацикливание в одном user-turn.
    core_fallback_threshold: 0.4
    core_fallback_action_name: action_default_fallback

assistant_id: 20260510-hr-ml-team-screening

# Параметры скрининга — читаются actions/actions.py при старте сервера
screening:
  min_correct_answers: 3   # минимум правильных ответов в квизе (из 5)
  min_years_experience: 0  # минимальный стаж в годах (0 = не проверяем)
